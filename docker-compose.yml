services:
  postgres:
    image: postgres:16-alpine
    container_name: rust_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rust_context_app_network

  krug:
    image: krug-local
    container_name: rust_app
    restart: unless-stopped
    ports:
      - "80:${SERVER_PORT:-8080}"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rust_context_app_network

networks:
  rust_context_app_network:
    driver: bridge

volumes:
  postgres_data: